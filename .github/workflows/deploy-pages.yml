name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # NOTE: GitHub Pages must be enabled once for this repository via
      # Settings > Pages > Build and deployment > Source: "GitHub Actions".
      # The default GITHUB_TOKEN is not permitted to create the Pages site
      # itself (that requires admin), so we do NOT pass `enablement: true`
      # here. Doing so previously caused the workflow to always fail with
      # "Create Pages site failed. Error: Resource not accessible by integration".
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload the whole repository root (static site, no build step).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
