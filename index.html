<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Testbed — Map Test</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Weather Testbed</h1>
      <p class="subtitle">Simple map test — Leaflet base map with optional weather overlays</p>
    </header>

    <div id="map"></div>

    <aside class="panel">
      <h2>Layers</h2>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-clouds" />
        <span>Clouds</span>
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-precipitation" />
        <span>Precipitation</span>
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-temp" />
        <span>Temperature</span>
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-wind" />
        <span>Wind</span>
      </label>

      <div id="api-key-warning" class="warning" hidden>
        Add your OpenWeatherMap API key in <code>config.js</code> to enable
        weather overlays.
      </div>

      <div class="coords">
        <span id="coords-display">Click the map to drop a marker</span>
      </div>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
