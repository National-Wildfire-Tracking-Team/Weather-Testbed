# Netlify configuration for the Weather Testbed site.
#
# The site is now built with Vite. Netlify runs the build command and publishes
# the generated `dist/` directory. Two common causes of a Netlify "Page not
# found" error are (1) the publish directory not pointing at the build output
# and (2) requests to paths that don't map to a file. Both are handled below.
#
# NOTE: Settings in this file OVERRIDE the values configured in the Netlify UI
# (Site settings > Build & deploy). So even if the dashboard has a stale publish
# directory, this file will take precedence.
#
# To keep the Mapbox token out of the repo, set VITE_MAPBOX_TOKEN as an
# environment variable in Site settings > Build & deploy > Environment.

[build]
  # Build the static site with Vite.
  command = "npm run build"
  # Vite emits the production site to `dist/`.
  publish = "dist"

# Safety net: this site is effectively a single page. Serve index.html (with a
# 200, not a redirect) for any path that doesn't match a real file, so a
# mistyped or unexpected URL shows the map instead of Netlify's 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
